<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>とけいよみ</title>
<style>
  :root{
    --sky1:#7ec8ff; --sky2:#bfe8ff;
    --face:#fffdf6; --ring:#ffcf4d; --ring2:#ff9f1c;
    --hour:#ff5a5f; --min:#2d6cdf; --ink:#3a3226;
    --ok:#34c759; --ng:#ff6b6b; --btn:#ff9f1c; --btn2:#34c759;
    --red24:#e23d4b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN",
      "Rounded Mplus 1c","M PLUS Rounded 1c","Yu Gothic",sans-serif;
    background:linear-gradient(160deg,var(--sky1),var(--sky2));
    color:var(--ink);min-height:100%;padding:12px 12px 0;overflow-x:hidden;
    user-select:none;-webkit-user-select:none;
    display:flex;flex-direction:column;align-items:center;
  }
  h1{
    margin:4px 0 6px;font-size:clamp(26px,8vw,40px);letter-spacing:.08em;color:#fff;
    text-shadow:0 3px 0 var(--ring2),0 6px 8px rgba(0,0,0,.15);text-align:center;
  }
  .hide{display:none !important;}
  button{font-family:inherit;cursor:pointer;touch-action:manipulation;}

  /* ---- トップページ ---- */
  #home{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:14px;}
  #ad{
    width:100%;max-width:340px;min-height:260px;background:#ffffffcc;border:2px dashed #ffffff;
    border-radius:18px;display:flex;align-items:center;justify-content:center;color:#9bb6cf;
    font-weight:700;font-size:15px;box-shadow:0 4px 0 #00000012;margin-top:4px;
  }
  #adTop{
    width:100%;max-width:420px;min-height:54px;background:#ffffffcc;border:2px dashed #ffffff;
    border-radius:12px;display:flex;align-items:center;justify-content:center;color:#9bb6cf;
    font-weight:700;font-size:13px;box-shadow:0 3px 0 #00000010;margin-bottom:6px;
  }
  .lead{font-size:18px;font-weight:800;color:#fff;text-shadow:0 2px 0 #00000022;margin-top:2px;}
  .seg{display:flex;gap:0;background:#ffffffcc;border-radius:999px;padding:5px;box-shadow:0 3px 0 #00000012;}
  .seg button{border:none;background:transparent;border-radius:999px;padding:10px 22px;font-size:17px;font-weight:800;color:#7a6f59;}
  .seg button.on{background:var(--ring);color:#5a3d00;box-shadow:0 2px 0 var(--ring2);}
  .segnote{font-size:13px;color:#fff;text-shadow:0 1px 0 #00000022;text-align:center;margin-top:-6px;min-height:18px;}
  .bigbtn{
    width:100%;max-width:340px;border:none;border-radius:20px;padding:20px;font-size:24px;font-weight:900;color:#fff;
    box-shadow:0 6px 0 #c97a00;background:var(--btn);
  }
  .bigbtn.read{background:var(--btn2);box-shadow:0 6px 0 #1f9e44;}
  .bigbtn.touch{background:var(--min);box-shadow:0 6px 0 #1a4ea8;}
  .bigbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #c97a00;}

  /* ---- ゲーム共通バー ---- */
  #gamebar{width:100%;max-width:460px;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center;}
  .home-btn{border:none;background:#ffffffcc;border-radius:999px;padding:9px 16px;font-size:15px;font-weight:800;box-shadow:0 2px 0 #00000018;color:var(--ink);}
  .chip{border:none;border-radius:999px;padding:7px 13px;font-size:14px;font-weight:700;background:#ffffffcc;color:var(--ink);box-shadow:0 2px 0 #00000018;}
  .chip.on{background:var(--ring);color:#5a3d00;box-shadow:0 3px 0 var(--ring2);}
  .lv{border:none;border-radius:999px;padding:7px 14px;font-size:15px;font-weight:800;background:#ffffffcc;color:var(--ink);box-shadow:0 2px 0 #00000018;}
  .lv.on{background:var(--min);color:#fff;box-shadow:0 3px 0 #1a4ea8;}

  .prompt{background:#fff;border-radius:18px;padding:10px 20px;font-size:clamp(22px,6.5vw,30px);font-weight:900;box-shadow:0 4px 0 #00000012;text-align:center;display:flex;align-items:center;gap:10px;}
  .prompt small{display:block;font-size:13px;font-weight:700;color:#9a8f7a;}
  .spk{border:none;background:var(--ring);border-radius:50%;width:42px;height:42px;font-size:20px;box-shadow:0 3px 0 var(--ring2);}
  .clockwrap{width:min(86vw,360px);aspect-ratio:1;margin:4px 0;touch-action:none;}
  svg{width:100%;height:100%;display:block;overflow:visible;}
  .hand{cursor:grab;} .hand:active{cursor:grabbing;}

  .controls{display:flex;gap:12px;margin:6px 0;}
  .btn{border:none;border-radius:16px;padding:14px 26px;font-size:20px;font-weight:900;color:#fff;background:var(--btn);box-shadow:0 5px 0 #c97a00;transition:transform .05s;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #c97a00;}
  .btn.next{background:var(--ok);box-shadow:0 5px 0 #1f9e44;}
  .btn:disabled{opacity:.4;}

  #opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(90vw,360px);margin:6px 0;}
  .opt{border:none;border-radius:18px;padding:18px 8px;font-size:22px;font-weight:900;background:#fff;color:var(--ink);box-shadow:0 5px 0 #00000014;}
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 #00000014;}
  .opt.right{background:var(--ok);color:#fff;box-shadow:0 5px 0 #1f9e44;}
  .opt.wrong{background:var(--ng);color:#fff;box-shadow:0 5px 0 #c23b3b;opacity:.85;}

  .stars{font-size:22px;letter-spacing:3px;min-height:30px;}

  .feedback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:20;}
  .mark{font-size:min(46vw,220px);font-weight:900;opacity:0;transform:scale(.4);transition:opacity .15s, transform .25s cubic-bezier(.2,1.4,.4,1);}
  .mark.show{opacity:.92;transform:scale(1);}
  .mark.ok{color:var(--ok);} .mark.ng{color:var(--ng);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;padding:10px 22px;border-radius:999px;font-weight:800;font-size:18px;box-shadow:0 4px 16px #0003;opacity:0;transition:opacity .2s;z-index:25;pointer-events:none;}
  .toast.show{opacity:1;}
  .conf{position:fixed;top:-30px;font-size:24px;z-index:15;pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}
  @media (prefers-reduced-motion:reduce){.mark{transition:opacity .1s;} .conf{display:none;}}
</style>
</head>
<body>
  <h1>とけいよみ</h1>
  <div id="adTop" class="hide">こうこく（じょうぶ・injectAd）</div>

  <!-- ======== トップページ ======== -->
  <div id="home">
    <div class="lead">うごきかた を えらんでね</div>
    <div class="seg" id="behavior">
      <button data-b="simple" class="on">かんたん</button>
      <button data-b="real">リアル</button>
    </div>
    <div class="segnote" id="behaviorNote">たんしん（みじかいはり）は すうじの ばしょに とまります</div>
    <button class="bigbtn" id="startSet">▶ とけいを あわせる</button>
    <button class="bigbtn read" id="startRead">▶ とけいを よむ</button>
    <button class="bigbtn touch" id="startTouch">▶ とけいを さわる</button>
    <div id="ad">こうこく（ここに injectAd）</div>
  </div>

  <!-- ======== ゲーム共通バー ======== -->
  <div id="gamebar" class="hide">
    <div class="row">
      <button class="home-btn" id="homeBtn">🏠 おうち</button>
      <span id="modeTitle" style="font-weight:900;color:#fff;text-shadow:0 2px 0 #0002;"></span>
    </div>
    <div class="row" id="levelRow"></div>
    <div class="row">
      <button class="chip" id="voiceChip">🔊 おんせい</button>
      <button class="chip" id="soundChip">🔔 こうかおん</button>
      <button class="chip" id="h24Chip">24じ</button>
      <button class="chip" id="minChip">ふん</button>
    </div>
  </div>

  <!-- ======== あわせるモード ======== -->
  <div id="setArea" class="hide" style="display:flex;flex-direction:column;align-items:center;">
    <div class="prompt"><span id="prompt">－</span><button class="spk" id="repeatSet">🔊</button></div>
  </div>

  <!-- ======== よむモード ======== -->
  <div id="readArea" class="hide" style="display:flex;flex-direction:column;align-items:center;">
    <div class="prompt"><span>とけいを よんでね　<small>なんじ かな？</small></span></div>
  </div>

  <!-- ======== さわるモード ======== -->
  <div id="touchArea" class="hide" style="display:flex;flex-direction:column;align-items:center;">
    <div class="prompt"><span id="touchTime">いま －</span><button class="spk" id="repeatTouch">🔊</button></div>
  </div>

  <!-- 時計（両モード共用） -->
  <div class="clockwrap" id="clockwrap">
    <svg id="clock" viewBox="0 0 400 400" aria-label="アナログどけい">
      <circle cx="200" cy="200" r="196" fill="#ff9f1c"/>
      <circle cx="200" cy="200" r="188" fill="#ffcf4d"/>
      <circle cx="200" cy="200" r="172" fill="#fffdf6" stroke="#00000010" stroke-width="2"/>
      <g id="ticks"></g>
      <g id="minNums" class="hide"></g>
      <g id="numbers"></g>
      <g id="nums24" class="hide"></g>
      <g id="minHand" class="hand">
        <line x1="200" y1="200" x2="200" y2="50" stroke="#2d6cdf" stroke-width="9" stroke-linecap="round"/>
        <circle cx="200" cy="50" r="20" fill="#2d6cdf" opacity="0"/>
      </g>
      <g id="hourHand" class="hand">
        <line x1="200" y1="200" x2="200" y2="96" stroke="#ff5a5f" stroke-width="14" stroke-linecap="round"/>
        <circle cx="200" cy="96" r="22" fill="#ff5a5f" opacity="0"/>
      </g>
      <circle cx="200" cy="200" r="11" fill="#3a3226"/>
      <circle cx="200" cy="200" r="5" fill="#fff"/>
    </svg>
  </div>

  <!-- あわせる：操作ボタン -->
  <div id="setControls" class="controls hide">
    <button class="btn" id="check">こたえあわせ</button>
    <button class="btn next" id="nextS">つぎへ ▶</button>
  </div>

  <!-- よむ：選択肢 -->
  <div id="opts" class="hide"></div>
  <div id="readControls" class="controls hide">
    <button class="btn next" id="nextR">つぎへ ▶</button>
  </div>

  <div class="stars hide" id="stars"></div>

  <div class="feedback"><div class="mark" id="mark"></div></div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const CX=200,CY=200;

const LEVELS=[
  {label:'○じ',     g:5, mins:[0]},
  {label:'○じはん', g:5, mins:[0,30]},
  {label:'5ふん',   g:5, mins:Array.from({length:12},(_,i)=>i*5)},
  {label:'1ぷん',   g:1, mins:Array.from({length:60},(_,i)=>i)},
];

const state={screen:'home',behavior:'simple',level:0,voice:true,sound:true,show24:false,showMin:false};
let target={h:0,m:0}, cur={h:0,m:0}, solved=false, score=0, prevM=0, readDone=false;

/* ===== もじばん ===== */
function txt(x,y,s,size,weight,fill){
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');
  t.setAttribute('font-size',size);t.setAttribute('font-weight',weight);t.setAttribute('fill',fill);
  t.textContent=s;return t;
}
(function buildFace(){
  const ticks=$('ticks'),nums=$('numbers'),n24=$('nums24'),mn=$('minNums');
  for(let i=0;i<60;i++){
    const a=(i/60)*2*Math.PI,big=i%5===0;
    const r1=big?156:164,r2=172;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',CX+Math.sin(a)*r1);l.setAttribute('y1',CY-Math.cos(a)*r1);
    l.setAttribute('x2',CX+Math.sin(a)*r2);l.setAttribute('y2',CY-Math.cos(a)*r2);
    l.setAttribute('stroke',big?'#3a3226':'#c9bfa6');l.setAttribute('stroke-width',big?4:2);
    ticks.appendChild(l);
  }
  for(let i=1;i<=12;i++){
    const a=(i/12)*2*Math.PI;
    nums.appendChild(txt(CX+Math.sin(a)*130, CY-Math.cos(a)*130+11, i, 32,800,'#3a3226'));
    n24.appendChild(txt(CX+Math.sin(a)*104, CY-Math.cos(a)*104+6, i+12, 16,800,'#e23d4b'));
    mn.appendChild(txt(CX+Math.sin(a)*150, CY-Math.cos(a)*150+5, i*5, 14,700,'#2d6cdf'));
  }
})();

/* ===== レベルボタン ===== */
(function(){
  const row=$('levelRow');
  LEVELS.forEach((lv,i)=>{
    const b=document.createElement('button');
    b.className='lv'+(i===0?' on':'');b.textContent=lv.label;
    b.onclick=()=>{state.level=i;[...row.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');newProblem();};
    row.appendChild(b);
  });
})();
function lvl(){return LEVELS[state.level];}

/* ===== ことばづくり ===== */
function jp(h,m){const H=h===0?12:h;return `${H}じ${m===0?'ちょうど':m+'ふん'}`;}
function speakStr(h,m){const H=h===0?12:h;return `${H}時${m===0?'ちょうど':m+'ふん'}`;}

/* ===== えがく ===== */
function render(t){
  const minDeg=t.m*6;
  const hourDeg=(t.h%12)*30 + (state.behavior==='real'? t.m*0.5 : 0);
  $('minHand').setAttribute('transform',`rotate(${minDeg} ${CX} ${CY})`);
  $('hourHand').setAttribute('transform',`rotate(${hourDeg} ${CX} ${CY})`);
}

/* ===== もんだい ===== */
function randTime(){
  const m=lvl().mins[Math.floor(Math.random()*lvl().mins.length)];
  return {h:Math.floor(Math.random()*12), m};
}
function newProblem(){
  if(state.screen==='set') newSet();
  else if(state.screen==='read') newRead();
  else if(state.screen==='touch') newTouch();
}
function newSet(){
  solved=false;$('check').disabled=false;
  target=randTime();
  do{cur=randTime();}while(cur.h===target.h&&cur.m===target.m);
  prevM=cur.m;
  $('prompt').innerHTML = `${jp(target.h,target.m)} <small>に あわせてね</small>`;
  render(cur);
  if(state.voice) speak('とけいを '+speakStr(target.h,target.m)+' に あわせてね');
}
function newRead(){
  readDone=false;
  target=randTime();cur={...target};render(cur);
  buildOptions();
  if(state.voice) speak('なんじ かな？');
}
function newTouch(){
  cur=randTime();prevM=cur.m;render(cur);updateTouchReadout();
  if(state.voice) speak('はりを うごかしてね');
}
function updateTouchReadout(){
  $('touchTime').textContent='いま '+jp(cur.h,cur.m);
}
function buildOptions(){
  const set=new Set([target.h+'_'+target.m]);const opts=[{...target}];let guard=0;
  while(opts.length<4&&guard++<80){
    const o=randTime();const k=o.h+'_'+o.m;
    if(!set.has(k)){set.add(k);opts.push(o);}
  }
  opts.sort(()=>Math.random()-0.5);
  const box=$('opts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';b.textContent=jp(o.h,o.m);
    b.onclick=()=>pickRead(o,b);box.appendChild(b);
  });
}
function pickRead(o,btn){
  if(readDone)return;
  const ok=(o.h===target.h&&o.m===target.m);
  ensureCtx();
  if(ok){
    readDone=true;btn.classList.add('right');showMark(true);beep(true);
    if(state.voice) speak('せいかい！ '+speakStr(target.h,target.m));
    score++;renderStars();confetti();$('nextR').classList.remove('hide');
  }else{
    btn.classList.add('wrong');btn.disabled=true;showMark(false);beep(false);
    if(state.voice) speak('ちがうよ');
    toast('もういちど！');
  }
}

/* ===== ドラッグ（あわせるモードのみ） ===== */
const clockEl=$('clock');let active=null;
function pAngle(ev){
  const r=clockEl.getBoundingClientRect();
  const px=((ev.clientX-r.left)/r.width)*400, py=((ev.clientY-r.top)/r.height)*400;
  let d=Math.atan2(px-CX,-(py-CY))*180/Math.PI;return d<0?d+360:d;
}
function angDist(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
function canDrag(){return state.screen==='set'||state.screen==='touch';}
function start(ev){
  if(!canDrag()||solved)return;
  const deg=pAngle(ev);
  const minDeg=cur.m*6, hourDeg=(cur.h%12)*30+(state.behavior==='real'?cur.m*0.5:0);
  active=(angDist(deg,hourDeg)-6<angDist(deg,minDeg))?'hour':'min';
  prevM=cur.m;clockEl.setPointerCapture(ev.pointerId);move(ev);ev.preventDefault();
}
function move(ev){
  if(!active||!canDrag())return;
  const deg=pAngle(ev);
  if(active==='min'){
    let m=(Math.round(Math.round(deg/6)/lvl().g)*lvl().g)%60;
    if(state.behavior==='real'){
      const diff=m-prevM;
      if(diff<-30)cur.h=(cur.h+1)%12;        // 12をこえて すすむ → 時くりあがり
      else if(diff>30)cur.h=(cur.h+11)%12;   // ぎゃくに もどる
    }
    cur.m=m;prevM=m;
  }else{
    cur.h=Math.round(deg/30)%12;
  }
  render(cur);
  if(state.screen==='touch') updateTouchReadout();
  ev.preventDefault();
}
function end(){
  if(active&&state.screen==='touch'){ensureCtx();if(state.voice) speak(speakStr(cur.h,cur.m));}
  active=null;
}
clockEl.addEventListener('pointerdown',start);
clockEl.addEventListener('pointermove',move);
clockEl.addEventListener('pointerup',end);
clockEl.addEventListener('pointercancel',end);

/* ===== はんてい（あわせる） ===== */
$('check').onclick=()=>{
  if(solved)return;ensureCtx();
  const ok=(cur.h===target.h&&cur.m===target.m);
  showMark(ok);beep(ok);
  if(ok){
    solved=true;score++;renderStars();$('check').disabled=true;$('nextS').classList.remove('hide');
    if(state.voice) speak('せいかい！ '+speakStr(target.h,target.m));
    toast('せいかい！ ⭐');confetti();
  }else{ if(state.voice) speak('ちがうよ'); toast('もういちど！'); }
};
$('nextS').onclick=newProblem;
$('nextR').onclick=newProblem;
$('repeatSet').onclick=()=>{ensureCtx();speak('とけいを '+speakStr(target.h,target.m)+' に あわせてね');};
$('repeatTouch').onclick=()=>{ensureCtx();speak(speakStr(cur.h,cur.m));};

/* ===== がめん きりかえ ===== */
function show(el,on){el.classList.toggle('hide',!on);}
const adDone={home:false,top:false};
function go(screen){
  state.screen=screen;
  show(document.querySelector('h1'),screen==='home');
  show($('adTop'),screen!=='home');
  show($('home'),screen==='home');
  show($('gamebar'),screen!=='home');
  show($('setArea'),screen==='set');
  show($('readArea'),screen==='read');
  show($('touchArea'),screen==='touch');
  show($('clockwrap'),screen!=='home');
  show($('setControls'),screen==='set');
  show($('opts'),screen==='read');
  show($('readControls'),screen==='read');
  show($('stars'),screen==='set'||screen==='read');
  const drag=(screen==='set'||screen==='touch')?'auto':'none';
  $('minHand').style.pointerEvents=drag;
  $('hourHand').style.pointerEvents=drag;
  $('modeTitle').textContent = screen==='set'?'あわせる':screen==='read'?'よむ':'さわる';
  // こうこく（はじめて ひょうじ された ときだけ よみこむ）
  if(screen==='home'&&!adDone.home){adDone.home=true;injectAd('ad','https://adm.shinobi.jp/s/ee41537d1735537f4937373bcb4f7742',260);}
  if(screen!=='home'&&!adDone.top){adDone.top=true;injectAd('adTop','https://adm.shinobi.jp/s/418bfde711f9e27c930019a0fc23979d',54);}
  if(screen!=='home') newProblem();
}
$('startSet').onclick=()=>go('set');
$('startRead').onclick=()=>go('read');
$('startTouch').onclick=()=>go('touch');
$('homeBtn').onclick=()=>{speechSynthesis&&speechSynthesis.cancel();go('home');};

/* ===== こうこく（忍者AdMax を iframe に かきこむ） ===== */
function injectAd(slotId,src,h){
  const slot=$(slotId);if(!slot)return;
  try{
    const ifr=document.createElement('iframe');
    ifr.setAttribute('frameborder','0');ifr.setAttribute('scrolling','no');
    ifr.style.border='0';ifr.style.width='100%';ifr.style.height=h+'px';ifr.style.display='block';
    slot.innerHTML='';slot.appendChild(ifr);
    const doc=ifr.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;padding:0;overflow:hidden;background:transparent;text-align:center;}</style></head><body><!-- admax --><script src="'+src+'"><\/script><!-- admax --></body></html>');
    doc.close();
  }catch(e){}
}

/* ===== せってい ===== */
$('behavior').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    state.behavior=b.dataset.b;
    $('behavior').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    $('behaviorNote').textContent = state.behavior==='simple'
      ? 'たんしん（みじかいはり）は すうじの ばしょに とまります'
      : 'ほんものの とけいと おなじ うごき（ながいはりで じが すすむ）';
  };
});
function bindChip(id,key,after){
  $(id).onclick=()=>{state[key]=!state[key];$(id).classList.toggle('on',state[key]);after&&after();};
  $(id).classList.toggle('on',state[key]);
}
bindChip('voiceChip','voice');
bindChip('soundChip','sound');
bindChip('h24Chip','show24',()=>show($('nums24'),state.show24));
bindChip('minChip','showMin',()=>show($('minNums'),state.showMin));

/* ===== えんしゅつ ===== */
function showMark(ok){
  const m=$('mark');m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng')+' show';
  setTimeout(()=>m.classList.remove('show'),ok?700:520);
}
let toastTimer;
function toast(s){const t=$('toast');t.textContent=s;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1100);}
function renderStars(){$('stars').textContent='⭐'.repeat(Math.min(score,10))+(score>10?` +${score-10}`:'');}
function confetti(){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  const e=['⭐','🎉','✨','🌟','🎈'];
  for(let i=0;i<14;i++){
    const d=document.createElement('div');d.className='conf';d.textContent=e[i%e.length];
    d.style.left=Math.random()*100+'vw';
    d.style.animation=`fall ${0.9+Math.random()*0.8}s ${Math.random()*0.3}s linear forwards`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),2200);
  }
}

/* ===== おと（WebAudio） ===== */
let actx=null;
function ensureCtx(){
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}
}
function tone(f,start,dur,type,vol){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,start);
  g.gain.exponentialRampToValueAtTime(vol,start+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(g).connect(actx.destination);o.start(start);o.stop(start+dur+0.05);
}
function beep(ok){
  if(!state.sound)return;ensureCtx();if(!actx)return;
  const t=actx.currentTime;
  if(ok){ // ピンポーン♪（あかるく うえへ）
    tone(784,t,0.16,'triangle',0.32);
    tone(1046,t+0.12,0.18,'triangle',0.32);
    tone(1318,t+0.24,0.42,'triangle',0.30);
  }else{ // ブッブー（ひくい ブザー）
    tone(180,t,0.16,'sawtooth',0.22);
    tone(140,t+0.17,0.30,'sawtooth',0.22);
  }
}

/* ===== おんせい（Web Speech） ===== */
let jaVoice=null;
function loadVoices(){try{const vs=speechSynthesis.getVoices();jaVoice=vs.find(v=>/ja|Japan/i.test(v.lang))||jaVoice;}catch(e){}}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function speak(text){
  if(!state.voice||!('speechSynthesis' in window))return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP';if(jaVoice)u.voice=jaVoice;u.rate=0.95;u.pitch=1.15;
    speechSynthesis.speak(u);}catch(e){}
}

/* ===== スタート ===== */
renderStars();
go('home');
</script>
